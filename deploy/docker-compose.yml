# Run from the repo root:
#   docker compose -f deploy/docker-compose.yml up -d
#
# Before first deploy, verify char device majors on the host:
#   ls -l /dev/ttyUSB0 /dev/ttyACM0
# CH340 master typically major 188, HDSC CDC slave typically major 166.
# If your host differs, edit `device_cgroup_rules` below.

name: rebot-record

services:
  rebot-record:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: rebot-record:latest
    container_name: rebot-record
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - "1882:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      # Stable udev symlinks (99-rebot-arms.rules on reDM) — survive replug/renumber
      MASTER_PORT: /dev/rebot-master
      SLAVE_PORT: /dev/rebot-slave
      REBOT_RETURN_TIME: "2.0"
      REBOT_TRANSITION_TIME: "0.6"
    volumes:
      - /dev:/dev
      - ../recordings:/app/recordings
      - ../frontend/dist:/app/frontend/dist:ro
      # Hot-mount backend source so `./car rebot-record sync` picks up changes
      # without rebuilding the image. uv installs the project editable, so
      # imports resolve through this mount.
      - ../backend:/app/backend:ro
    device_cgroup_rules:
      # CH340 USB→serial (B601-DM master) — char major 188
      - "c 188:* rmw"
      # USB CDC ACM (HDSC SO102 slave on r2x) — char major 166
      - "c 166:* rmw"
      # usb_ch343 (SO102 on ReTerminal DM, ttyCH343USB*) — char major 170
      - "c 170:* rmw"
